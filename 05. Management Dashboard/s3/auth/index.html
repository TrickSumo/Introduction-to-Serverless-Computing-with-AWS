<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Authenticating…</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      background: #0f172a;
      color: #e2e8f0;
    }
    .card {
      text-align: center;
      padding: 2rem 2.5rem;
      background: #1e293b;
      border-radius: 12px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
      max-width: 420px;
    }
    #message { margin: 0; font-size: 1.1rem; }
    .error { color: #f87171; }
    .success { color: #4ade80; }
    .spinner {
      width: 28px;
      height: 28px;
      margin: 0 auto 1rem;
      border: 3px solid #334155;
      border-top-color: #38bdf8;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    .hidden { display: none; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="card">
    <div id="spinner" class="spinner hidden"></div>
    <p id="message">Checking authentication…</p>
  </div>

  <script>
    (function () {
      var messageEl = document.getElementById("message");
      var spinnerEl = document.getElementById("spinner");

      function showMessage(text, type) {
        messageEl.textContent = text;
        messageEl.className = type || "";
        spinnerEl.classList.add("hidden");
      }

      // Share link: /auth/?pass=<token>&resumeId=<sub>
      var params = new URLSearchParams(window.location.search);
      var pass = params.get("pass");
      var resumeId = params.get("resumeId");

      if (!resumeId) {
        showMessage("Resume link is invalid (no resumeId)", "error");
        return;
      }
      if (!pass) {
        showMessage("Access code missing", "error");
        return;
      }

      spinnerEl.classList.remove("hidden");
      messageEl.textContent = "Authenticating…";

      // Forward BOTH values. The Lambda checks pass against this resume's
      // stored code and mints signed cookies scoped to media/<resumeId>/*,
      // plus the resumeId cookie the home page reads.
      var qs = "pass=" + encodeURIComponent(pass) +
               "&resumeId=" + encodeURIComponent(resumeId);

      fetch("/api/auth/getSignedCookies?" + qs, {
        method: "GET",
        credentials: "include"
      })
        .then(function (response) {
          if (response.ok) {
            window.location.href = "/";   // cookies are set; load the resume
            return;
          }
          return response.text().then(function (body) {
            var detail = body || ("Request failed (" + response.status + ")");
            showMessage("Authentication failed: " + detail, "error");
          });
        })
        .catch(function (err) {
          showMessage("Authentication failed: " + err.message, "error");
        });
    })();
  </script>
</body>
</html>
